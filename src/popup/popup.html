<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Permafeed</title>
    <style>
      :root {
        --bg: #0f0f0f;
        --fg: #f1f1f1;
        --muted: #aaa;
        --accent: #3ea6ff;
        --card: #1f1f1f;
        --border: #333;
      }
      * { box-sizing: border-box; }
      body {
        width: 360px;
        margin: 0;
        padding: 14px;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.4 Roboto, Arial, sans-serif;
      }
      h1 { font-size: 15px; margin: 0 0 2px; }
      .sub { color: var(--muted); font-size: 12px; margin: 0 0 14px; }

      .modes { display: flex; flex-direction: column; gap: 8px; }
      label.mode {
        display: flex; gap: 10px; align-items: flex-start;
        padding: 10px; border: 1px solid var(--border); border-radius: 10px;
        cursor: pointer; background: var(--card);
      }
      label.mode.active { border-color: var(--accent); }
      label.mode input { margin-top: 2px; accent-color: var(--accent); }
      .mode .name { font-weight: 500; }
      .mode .desc { color: var(--muted); font-size: 12px; }

      button#refresh {
        margin-top: 14px; width: 100%; padding: 10px; border: none;
        border-radius: 10px; background: var(--accent); color: #03203a;
        font-weight: 600; cursor: pointer;
      }
      button#refresh:disabled { opacity: .4; cursor: default; }
      .status { margin-top: 8px; font-size: 12px; color: var(--muted); min-height: 16px; }

      hr { border: none; border-top: 1px solid var(--border); margin: 16px 0 12px; }

      .log-head {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 8px;
      }
      .log-head h2 { font-size: 13px; margin: 0; }
      .log-head .count { color: var(--muted); font-size: 12px; font-weight: 400; }
      .log-tools { display: flex; gap: 8px; align-items: center; }
      .log-tools button {
        background: none; border: 1px solid var(--border); color: var(--muted);
        border-radius: 8px; padding: 4px 8px; font-size: 12px; cursor: pointer;
      }
      .log-tools button:hover { color: var(--fg); border-color: var(--muted); }

      label.toggle {
        display: flex; gap: 8px; align-items: center; font-size: 12px;
        color: var(--muted); margin-bottom: 10px; cursor: pointer;
      }
      label.toggle input { accent-color: var(--accent); }

      input#search {
        width: 100%; padding: 8px 10px; margin-bottom: 10px;
        background: var(--card); border: 1px solid var(--border);
        border-radius: 8px; color: var(--fg); font-size: 13px;
      }
      input#search::placeholder { color: #777; }

      .log-list { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
      a.entry {
        display: flex; gap: 10px; text-decoration: none; color: inherit;
        padding: 6px; border-radius: 8px;
      }
      a.entry:hover { background: var(--card); }
      a.entry img {
        width: 96px; height: 54px; object-fit: cover; border-radius: 6px;
        background: var(--card); flex: none;
      }
      .entry .meta { min-width: 0; display: flex; flex-direction: column; justify-content: center; }
      .entry .title {
        font-size: 13px; line-height: 1.3; max-height: 2.6em; overflow: hidden;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      }
      .entry .by { color: var(--muted); font-size: 12px; margin-top: 2px; }
      .empty { color: var(--muted); font-size: 12px; padding: 8px 0; }
    </style>
  </head>
  <body>
    <h1>Permafeed</h1>
    <p class="sub">Stop the home feed from regenerating.</p>

    <div class="modes">
      <label class="mode" data-mode="default">
        <input type="radio" name="mode" value="default" />
        <span>
          <span class="name">Default</span><br />
          <span class="desc">Vanilla YouTube. Kill switch.</span>
        </span>
      </label>
      <label class="mode" data-mode="freeze">
        <input type="radio" name="mode" value="freeze" />
        <span>
          <span class="name">❄ Freeze</span><br />
          <span class="desc">Keep the last feed you saw until you refresh.</span>
        </span>
      </label>
    </div>

    <button id="refresh">❄ Refresh feed now</button>
    <div class="status" id="status"></div>

    <hr />

    <div class="log-head">
      <h2>Recently seen <span class="count" id="count"></span></h2>
      <div class="log-tools">
        <button id="clear">Clear</button>
      </div>
    </div>

    <label class="toggle">
      <input type="checkbox" id="log-enabled" />
      Record videos I see on Home
    </label>

    <input id="search" type="search" placeholder="Search title or channel..." />
    <div class="log-list" id="list"></div>

    <script src="popup.js"></script>
  </body>
</html>
