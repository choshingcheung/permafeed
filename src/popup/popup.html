<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Permafeed</title>
    <style>
      :root {
        --bg: #0f0f0f;
        --fg: #f1f1f1;
        --muted: #aaa;
        --accent: #3ea6ff;
        --card: #1f1f1f;
        --border: #333;
      }
      * { box-sizing: border-box; }
      body {
        width: 260px;
        margin: 0;
        padding: 14px;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.4 Roboto, Arial, sans-serif;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 2px;
      }
      .sub {
        color: var(--muted);
        font-size: 12px;
        margin: 0 0 14px;
      }
      .modes { display: flex; flex-direction: column; gap: 8px; }
      label.mode {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        cursor: pointer;
        background: var(--card);
      }
      label.mode.active { border-color: var(--accent); }
      label.mode input { margin-top: 2px; accent-color: var(--accent); }
      .mode .name { font-weight: 500; }
      .mode .desc { color: var(--muted); font-size: 12px; }
      button#refresh {
        margin-top: 14px;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: #03203a;
        font-weight: 600;
        cursor: pointer;
      }
      button#refresh:disabled { opacity: .4; cursor: default; }
      .status { margin-top: 10px; font-size: 12px; color: var(--muted); min-height: 16px; }
    </style>
  </head>
  <body>
    <h1>Permafeed</h1>
    <p class="sub">Stop the home feed from regenerating.</p>

    <div class="modes">
      <label class="mode" data-mode="default">
        <input type="radio" name="mode" value="default" />
        <span>
          <span class="name">Default</span><br />
          <span class="desc">Vanilla YouTube. Kill switch.</span>
        </span>
      </label>
      <label class="mode" data-mode="freeze">
        <input type="radio" name="mode" value="freeze" />
        <span>
          <span class="name">❄ Freeze</span><br />
          <span class="desc">Keep the last feed you saw until you refresh.</span>
        </span>
      </label>
    </div>

    <button id="refresh">❄ Refresh feed now</button>
    <div class="status" id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
