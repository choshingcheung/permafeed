<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Permafeed</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="stagger">
      <header>
        <div class="crest">❄</div>
        <div class="word">
          <span class="name">Permafeed</span>
          <span class="tag">feed, kept on ice</span>
        </div>
      </header>

      <div class="modes">
        <label class="mode" data-mode="default">
          <span class="dot"></span>
          <input type="radio" name="mode" value="default" />
          <span>
            <span class="name">Default</span>
            <div class="desc">Vanilla YouTube. Nothing touched.</div>
          </span>
        </label>
        <label class="mode" data-mode="freeze">
          <span class="dot"></span>
          <input type="radio" name="mode" value="freeze" />
          <span>
            <span class="name">❄ Freeze</span>
            <div class="desc">Hold the last feed you saw until you refresh.</div>
          </span>
        </label>
      </div>

      <div>
        <button id="refresh">❄ Refresh feed now</button>
        <div class="status" id="status"></div>
      </div>

      <div class="seam"></div>

      <div>
        <div class="label">
          <span>Recently seen <span class="count" id="count"></span></span>
          <button class="ghost" id="clear">Clear</button>
        </div>

        <label class="toggle">
          <input type="checkbox" id="log-enabled" />
          <span class="track"></span>
          <span class="text">Record videos I see on Home</span>
        </label>

        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" />
          </svg>
          <input id="search" type="search" placeholder="Search title or channel..." />
        </div>

        <div class="log-list" id="list"></div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
